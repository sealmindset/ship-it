# .ship-it.yml — Configuration for /ship-it
#
# This file has two sections:
#
#   app:   Auto-generated by /make-it (or filled by the developer).
#          Describes WHAT is being deployed.
#
#   infra: Filled once by DevOps. Describes WHERE and HOW to deploy.
#          Can be per-org (shared across apps) or per-app (customized).
#
# If this file is missing, /ship-it uses sensible defaults for everything.
# If only `app` is present (no `infra`), /ship-it creates the PR but
# marks deployment as "pending DevOps configuration."

# ═══════════════════════════════════════════════════════════════
# APP — What is being deployed (auto-populated by /make-it)
# ═══════════════════════════════════════════════════════════════
app:
  # App identity
  name: ""                        # Human-readable name (e.g., "TaskHub")
  slug: ""                        # Kebab-case identifier (e.g., "task-hub")
  description: ""                 # One-line description

  # Stack (auto-detected if not set)
  stack: ""                       # e.g., "fastapi-nextjs", "nextjs", "flask", "express"
  project_type: ""                # e.g., "web-app", "api-service", "cli"

  # Services this app runs (used for container/task definitions)
  services:
    - name: backend
      dockerfile: backend/Dockerfile
      port: 8000
      health_check: /health
      cpu: 512                    # Fargate CPU units (256, 512, 1024, 2048, 4096)
      memory: 1024                # Fargate memory in MB
    - name: frontend
      dockerfile: frontend/Dockerfile
      port: 3000
      health_check: /
      cpu: 256
      memory: 512

  # Database
  database:
    engine: postgresql            # postgresql, mysql, none
    version: "16"

  # Auth (from app-context.json)
  auth:
    provider: oidc                # oidc, none
    # OIDC config comes from environment secrets, not this file

# ═══════════════════════════════════════════════════════════════
# INFRA — Where and how to deploy (filled by DevOps)
# ═══════════════════════════════════════════════════════════════
infra:
  # Cloud provider
  provider: aws                   # aws, azure, gcp

  # AWS-specific
  aws:
    region: us-east-1
    account_id: ""                # e.g., "123456789012"
    ecr_registry: ""              # e.g., "123456789012.dkr.ecr.us-east-1.amazonaws.com"

    # Networking (DevOps provides these once per organization)
    vpc_id: ""
    private_subnets: []           # e.g., ["subnet-abc123", "subnet-def456"]
    public_subnets: []            # e.g., ["subnet-ghi789", "subnet-jkl012"]

    # ECS / Fargate
    ecs:
      cluster_name: ""            # e.g., "apps-cluster" (shared) or "{slug}-cluster" (dedicated)
      execution_role_arn: ""      # e.g., "arn:aws:iam::123456789012:role/ecsTaskExecutionRole"
      task_role_arn: ""           # e.g., "arn:aws:iam::123456789012:role/ecsTaskRole"
      service_discovery_namespace: ""  # Optional: AWS Cloud Map namespace

    # RDS (if database.engine != none)
    rds:
      instance_class: db.t3.micro # Dev default — DevOps overrides for prod
      allocated_storage: 20       # GB
      multi_az: false             # true for production
      backup_retention: 7         # days

    # ALB (load balancer)
    alb:
      certificate_arn: ""         # ACM certificate for HTTPS
      health_check_path: /health
      idle_timeout: 60            # seconds

    # DNS
    dns:
      hosted_zone_id: ""          # Route53 hosted zone
      domain: ""                  # e.g., "apps.example.com"
      # App URL will be: {slug}.{domain} (e.g., task-hub.apps.example.com)

    # Secrets
    secrets:
      # Secrets Manager prefix — secrets stored as {prefix}/{slug}/{env}
      prefix: /make-it

  # Azure-specific (used when provider: azure)
  # azure:
  #   subscription_id: ""
  #   resource_group_prefix: ""   # e.g., "rg" → rg-{slug}-dev, rg-{slug}-prod
  #   acr_name: ""                # Azure Container Registry
  #   aks_cluster: ""             # or app_service_plan for non-container

# ═══════════════════════════════════════════════════════════════
# DEPLOYMENT — How the pipeline behaves
# ═══════════════════════════════════════════════════════════════
deployment:
  # GitHub environments (configure protection rules in repo Settings)
  environments:
    dev: dev
    staging: staging              # Optional — remove if not used
    production: production

  # Reviewers auto-assigned to production PRs
  reviewers: []
    # - devops-lead
    # - team-lead

  # PR go-live checklist (plain language — the developer sees these)
  # If omitted, /ship-it uses a sensible default checklist.
  prerequisites:
    - "Does this app need users to log in? (SSO / App registration)"
    - "Does this need a secure web address? (SSL certificate)"
    - "Who should have access in production? (Permissions / RBAC)"
    - "Does this need a URL people can visit? (DNS setup)"
    - "Does this need to talk to internal systems? (Network / firewall)"

  # Reusable workflow reference (if your org uses shared workflows)
  # If set, /ship-it generates a caller workflow referencing this.
  # If omitted, /ship-it generates a standalone workflow.
  # reusable_workflow: "{org}/{repo}/.github/workflows/ship-it-pipeline.yml@main"

  # Strategy: how services are deployed
  strategy: rolling               # rolling, blue-green, canary

  # Auto-rollback on failed health check
  rollback: true
