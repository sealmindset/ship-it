# .ship-it.yml — DevOps team configuration for /ship-it
#
# Drop this file in the root of any repo. The /ship-it skill reads it
# automatically so developers never have to answer setup questions.
#
# If this file is missing, /ship-it uses sensible defaults for everything.

# ── Reviewers ──────────────────────────────────────────────
# GitHub usernames that should be auto-assigned to every
# production request. These people get notified automatically.
# If omitted, /ship-it checks for a CODEOWNERS file instead.
reviewers:
  - team-lead-username
  # - another-reviewer

# ── Environments ───────────────────────────────────────────
# GitHub environment names (configure required reviewers and
# protection rules in GitHub repo Settings > Environments).
environments:
  dev: dev
  production: production

# ── Workflow ───────────────────────────────────────────────
# Path to the CI/CD workflow the DevOps team manages.
# If set, /ship-it will NOT generate its own workflow file —
# it uses this one instead.
# If omitted, /ship-it auto-generates a workflow on first run
# based on the detected project type (Node, Python, Go, etc).
# workflow: .github/workflows/deploy.yml

# ── Prerequisites ──────────────────────────────────────────
# Custom go-live checklist items added to every production PR.
# These replace the default checklist. Use plain language —
# the developer sees these directly.
# If omitted, /ship-it uses a generic checklist.
prerequisites:
  - "Does this app need users to log in? (SSO / App registration)"
  - "Does this need a secure web address? (SSL certificate)"
  - "Who should have access in production? (Permissions / RBAC)"
  - "Does this need a URL people can visit? (DNS setup)"
  - "Does this need to talk to internal systems? (Network / firewall)"

# ── Description ────────────────────────────────────────────
# Default app description used in PR titles if the developer
# doesn't provide one. If omitted, /ship-it uses the most
# recent commit message or the branch name.
# description: "My application"
